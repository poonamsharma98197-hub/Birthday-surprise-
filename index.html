<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>

body{
margin:0;
background:#ffd6ec;
font-family:Arial;
text-align:center;
overflow:hidden;
}

.container{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.face{
width:200px;
height:200px;
background:#ffe0bd;
border-radius:50%;
position:relative;
}

.eye{
width:20px;
height:20px;
background:black;
border-radius:50%;
position:absolute;
top:70px;
}

.eye.left{ left:50px; }
.eye.right{ right:50px; }

.mouth{
width:60px;
height:20px;
background:#8b0000;
border-radius:0 0 50px 50px;
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
transition:0.4s;
}

.big{
height:80px;
width:100px;
}

.huge{
height:120px;
width:140px;
}

button{
margin-top:30px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

#message{
font-size:40px;
color:#ff1744;
margin-top:20px;
display:none;
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:scale(0)}
80%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.confetti{
position:absolute;
width:10px;
height:10px;
background:red;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100vh)}
100%{transform:translateY(100vh)}
}

</style>
</head>

<body>

<div class="container">

<div class="face">

<div class="eye left"></div>
<div class="eye right"></div>

<div id="mouth" class="mouth"></div>

</div>

<button onclick="tap()">Tap</button>

<div id="message">🎉 HAPPY BIRTHDAY DUSHYANT 🎉</div>

</div>

<audio id="sound" src="https://www.soundjay.com/human/applause-8.mp3"></audio>

<script>

let step=0;

function tap(){

step++;

let mouth=document.getElementById("mouth");

if(step==1){
mouth.classList.add("big");
}

else if(step==2){
mouth.classList.add("huge");
}

else if(step==3){

document.getElementById("message").style.display="block";

document.getElementById("sound").play();

confetti();

}

}

function confetti(){

for(let i=0;i<100;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.backgroundColor="hsl("+Math.random()*360+"deg,100%,50%)";

c.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(c);

}

}

</script>

</body>
</html>
